name: Scheduled Webhook Ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Webhook Ping
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"text": "team status: Check Workflow en controleer agents om de 10 minuten & healthcheck"}' \
            "https://api.enginelabs.ai/webhooks/agent-teams/blms6sl0wavmbwqa03fks"
