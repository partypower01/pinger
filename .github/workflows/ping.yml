name: Scheduled Webhook Ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Webhook Ping
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"event": "team.message", "payload": {"message": "team status: Healthcheck & workflow check en controleer agents op activiteit"}}' \
            "https://api.enginelabs.ai/webhooks/agent-teams/blms6sl0wavmbwqa03fks"
